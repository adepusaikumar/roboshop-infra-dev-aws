bastion:
- name: bastion_internet
  port: 22
  src: internet
  dest: bastion

mongodb:
- name: mongodb_bastion
  port: 22
  src: bastion
  dest: mongodb

- name: mongodb_catalogue # MongoDB accepting connections from Catalogue
  port: 27017
  src: catalogue
  dest: mongodb

- name: mongodb_user
  port: 27017
  src: user
  dest: mongodb

mysql:
- name: mysql_bastion
  port: 22
  src: bastion
  dest: mysql

redis:
- name: redis_bastion
  port: 22
  src: bastion
  dest: redis

rabbitmq:
- name: rabbitmq_bastion
  port: 22
  src: bastion
  dest: rabbitmq